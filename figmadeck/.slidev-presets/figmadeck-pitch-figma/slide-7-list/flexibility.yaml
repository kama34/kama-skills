archetype: figmadeck-pitch-list
content_type: context
figma_source:
  nodeId: "1:124"
  name: "What We Do"

slots:
  SECTION_TITLE:
    description: Gold section heading (Staatliches, top-left)
    max_length: 20
    overflow: truncate
  AGENCY:
    description: Agency name in footer (right)
    max_length: 40
    overflow: truncate
  PHASE:
    description: Phase label in footer (far right)
    max_length: 15
    overflow: truncate
  ITEM_1:
    description: First list item (large body text, row 1)
    max_length: 65
    overflow: wrap
    note: "Row height 15.65% of 1080px = 169px. At 2.03rem/1.262 line-height (~41px/line), 2-line max = ~82px safe. Keep under 65 Cyr chars to stay at 2 lines."
  ITEM_2:
    description: Second list item (large body text, row 2)
    max_length: 65
    overflow: wrap
    note: "Same row height as ITEM_1. Max 65 Cyr chars for 2-line wrap."
  ITEM_3:
    description: Third list item (large body text, row 3)
    max_length: 65
    overflow: wrap
    note: "Same row height as ITEM_1. Max 65 Cyr chars for 2-line wrap."
  ITEM_4:
    description: Fourth list item (large body text, last row — bottom separator only)
    max_length: 80
    overflow: wrap
    note: "Last row — 3-line wrap acceptable as no item below. Still prefer ≤65 chars."

layout:
  grid_columns: fixed
  cards:
    count_in_figma: 4
    min: 3
    max: 4
    scaling: stack
  preserve:
    - black-background
    - dashed-separator-lines
    - geometric-icon-per-row
    - icon-colors-sequence
    - font-size-hierarchy
  flexible:
    - item-content
    - item-count
