archetype: figmadeck-pitch-vision-light
content_type: vision
figma_source:
  nodeId: "1:102"
  name: "Vision Light"
  also_used_by:
    - nodeId: "1:185"
      name: "Vision Light Alt"

slots:
  TITLE:
    description: Centered bold title inside notebook card
    max_length: 60
    overflow: shrink-font
  DESCRIPTION:
    description: Centered body text — key statement, quote, or insight
    max_length: 200
    overflow: shrink-font
  AGENCY:
    description: Agency name in footer (right)
    max_length: 40
    overflow: truncate
  PHASE:
    description: Phase label in footer (far right)
    max_length: 15
    overflow: truncate

layout:
  grid_columns: fixed
  preserve:
    - notebook-card-centered-layout
    - beige-outer-gold-inner-bg
    - font-size-hierarchy
    - border-radius
  flexible:
    - title-content
    - description-content
