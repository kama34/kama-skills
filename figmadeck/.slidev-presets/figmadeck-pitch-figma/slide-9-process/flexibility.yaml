archetype: figmadeck-pitch-process
content_type: process
figma_source:
  nodeId: "1:165"
  name: "Our Process"

slots:
  SECTION_TITLE:
    description: Section heading (top-left, uppercase)
    max_length: 25
    overflow: truncate
  AGENCY:
    description: Agency name in footer (right)
    max_length: 40
    overflow: truncate
  PHASE:
    description: Phase label in footer (far right)
    max_length: 15
    overflow: truncate
  PHASE_1_NUM:
    description: Phase 1 number label in process bar (BioRhyme Expanded, bold)
    max_length: 4
    overflow: truncate
  PHASE_1_NAME:
    description: Phase 1 name in process bar (Staatliches, uppercase)
    max_length: 18
    overflow: truncate
  PHASE_1_DESC:
    description: Phase 1 description below the bar
    max_length: 120
    overflow: wrap
  PHASE_2_NUM:
    description: Phase 2 number label in process bar
    max_length: 4
    overflow: truncate
  PHASE_2_NAME:
    description: Phase 2 name in process bar
    max_length: 18
    overflow: truncate
  PHASE_2_DESC:
    description: Phase 2 description below the bar
    max_length: 120
    overflow: wrap
  PHASE_3_NUM:
    description: Phase 3 number label in process bar
    max_length: 4
    overflow: truncate
  PHASE_3_NAME:
    description: Phase 3 name in process bar
    max_length: 18
    overflow: truncate
  PHASE_3_DESC:
    description: Phase 3 description below the bar
    max_length: 120
    overflow: wrap
  PHASE_4_NUM:
    description: Phase 4 number label in process bar
    max_length: 4
    overflow: truncate
  PHASE_4_NAME:
    description: Phase 4 name in process bar
    max_length: 18
    overflow: truncate
  PHASE_4_DESC:
    description: Phase 4 description below the bar
    max_length: 120
    overflow: wrap

layout:
  grid_columns: fixed
  cards:
    count_in_figma: 4
    min: 3
    max: 5
    scaling: grid-auto
  preserve:
    - horizontal-process-bar
    - rounded-ends-on-bar
    - color-per-phase-segment
    - description-columns-below-bar
    - font-size-hierarchy
  flexible:
    - phase-count
    - phase-name-content
    - description-content
