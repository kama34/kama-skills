archetype: figmadeck-pitch-clients-gallery
content_type: credentials
figma_source:
  nodeId: "1:204"
  name: "Clients Gallery"

slots:
  SECTION_TITLE:
    description: Orange section heading on black background (Staatliches, top-left)
    max_length: 20
    overflow: truncate
  AGENCY:
    description: Agency name in footer (right, light text on dark)
    max_length: 40
    overflow: truncate
  PHASE:
    description: Phase label in footer (far right, light text)
    max_length: 15
    overflow: truncate
  IMAGE_1:
    description: Col 1 tall image (top) — portrait or landscape project photo
    overflow: object-fit-cover
  IMAGE_2:
    description: Col 1 short image (bottom)
    overflow: object-fit-cover
  IMAGE_3:
    description: Col 2 short image (top)
    overflow: object-fit-cover
  IMAGE_4:
    description: Col 2 tall image (bottom)
    overflow: object-fit-cover
  IMAGE_5:
    description: Col 3 medium image (top)
    overflow: object-fit-cover
  IMAGE_6:
    description: Col 3 medium image (bottom)
    overflow: object-fit-cover

layout:
  grid_columns: fixed
  preserve:
    - black-background
    - 3-column-masonry
    - alternating-tall-short-pattern
    - border-radius
    - font-size-hierarchy
  flexible:
    - image-content
    - section-title-content
