<div style="position:absolute;inset:0;z-index:1;overflow:hidden;">
  <!-- Full-bleed background image -->
  <img src="{{IMAGE_URL}}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.background='#cccccc'" />
  <!-- Centered project name text. Figma: centered, top=calc(50%-33px)=507px → 46.94% → ~47%, w=820px/1920=42.71% -->
  <div style="position:absolute;left:50%;top:47%;transform:translateX(-50%) translateY(-50%);width:42.71%;font-family:var(--font-section);font-weight:700;font-size:1.41rem;line-height:2.75rem;letter-spacing:0.197rem;color:var(--color-text);text-align:center;text-transform:uppercase;">{{TITLE}}</div>
</div>
