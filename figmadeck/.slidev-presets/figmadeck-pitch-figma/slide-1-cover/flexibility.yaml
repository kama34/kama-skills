archetype: figmadeck-pitch-cover
content_type: intro
figma_source:
  nodeId: "1:32"
  name: "Cover"

slots:
  WORD_1:
    description: First large hero word (top of notebook card). At 15.16rem Staatliches condensed.
    max_length: 5
    max_length_cyrillic: 4
    overflow: shrink-font
    note: "Cyrillic chars ~44% wider than Latin in Staatliches. Latin max 5, Cyrillic max 4 narrow chars (avoid: М,Ш,Щ,Ж,Ц,Ю,Ф)"
  WORD_2:
    description: Second large hero word (bottom-right of card, right-aligned). At 15.16rem.
    max_length: 4
    max_length_cyrillic: 3
    overflow: shrink-font
    note: "Latin max 4, Cyrillic max 3 narrow chars. Wide Cyrillic overflows 45.26% container."
  DATE:
    description: Date or subtitle line below WORD_1
    max_length: 30
    overflow: truncate
  PRESENTER:
    description: Presenter name and/or role
    max_length: 40
    overflow: truncate

layout:
  grid_columns: fixed
  preserve:
    - notebook-card-shape
    - binder-tabs-left
    - font-size-hierarchy
    - color-usage
    - border-radius
  flexible:
    - word-1-content
    - word-2-content
    - date-content
    - presenter-content
