archetype: figmadeck-pitch-vision-dark
content_type: vision
figma_source:
  nodeId: "1:119"
  name: "Vision Dark"

slots:
  SECTION_TITLE:
    description: Orange section heading (Staatliches, top-left)
    max_length: 25
    overflow: truncate
  DESCRIPTION:
    description: Large centered body text — key statement or tagline (BioRhyme Expanded)
    max_length: 150
    overflow: shrink-font
  AGENCY:
    description: Agency name in footer (right)
    max_length: 40
    overflow: truncate
  PHASE:
    description: Phase label in footer (far right)
    max_length: 15
    overflow: truncate

layout:
  grid_columns: fixed
  preserve:
    - black-background
    - orange-section-title
    - large-body-text-width
    - font-size-hierarchy
    - color-usage
  flexible:
    - section-title-content
    - description-content
